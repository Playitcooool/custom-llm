model:
  vocab_size: 8192
  n_layers: 8
  d_model: 640
  n_heads: 8
  n_kv_heads: 4
  intermediate_dim: 2560
  max_seq_len: 512
  sliding_window: 256
  local_layers_per_global: 4
  rope_theta: 10000.0
  rms_norm_eps: 1.0e-6
  qk_norm: true
  ple_dim: 64
  use_ple: true
  dropout: 0.0

train:
  seq_len: 512
  batch_size: 4
  steps: 5000
  lr: 0.0003
  optimizer: muon
  adamw_lr: 0.0003
  muon_lr: 0.02
  muon_momentum: 0.95
  muon_ns_steps: 5